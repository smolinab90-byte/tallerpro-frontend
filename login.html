<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TallerPro — Iniciar sesión</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .login-wrap { width: 380px; }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .logo-mark-lg { width: 44px; height: 44px; background: var(--green); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .logo-mark-lg svg { width: 26px; height: 26px; fill: white; }
    .login-title { font-size: 26px; font-weight: 600; }
    .login-sub { font-size: 14px; color: var(--text-sec); margin-top: 4px; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 28px; box-shadow: var(--shadow-md); }
    .login-card .form-group { margin-bottom: 14px; }
    .login-btn { width: 100%; padding: 11px; font-size: 14px; justify-content: center; margin-top: 6px; border-radius: var(--radius-md); }
    .login-err { background: var(--red-light); color: var(--red); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-ter); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-logo">
        <div class="logo-mark-lg">
          <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        </div>
        <span class="login-title">TallerPro</span>
      </div>
      <div class="login-sub">Sistema de gestión para talleres mecánicos</div>
    </div>
    <div class="login-card">
      <div class="login-err" id="loginErr"></div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="admin@tallerpro.cl" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary login-btn" id="loginBtn" onclick="doLogin()">Ingresar</button>
    </div>
    <div class="login-footer">TallerPro MVP — v1.0</div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirigir si ya está logueado
    if (API.Auth.isLogged()) window.location.href = "/index.html";

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    async function doLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn      = document.getElementById("loginBtn");
      const errEl    = document.getElementById("loginErr");

      errEl.style.display = "none";
      if (!email || !password) { errEl.textContent = "Ingresa email y contraseña."; errEl.style.display = ""; return; }

      ui.loading(btn, true);
      try {
        const res = await API.AuthAPI.login(email, password);
        API.Auth.setToken(res.access_token);
        API.Auth.setUser(res.usuario);
        window.location.href = "/index.html";
      } catch (e) {
        errEl.textContent = e.message || "Error al iniciar sesión.";
        errEl.style.display = "";
        ui.loading(btn, false);
      }
    }
  </script>
</body>
</html>
