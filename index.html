<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TallerPro</title>
  <link rel="stylesheet" href="css/main.css">
  <!-- Configurar URL del backend antes de cargar api.js -->
  <script>window.TALLERPRO_API = "http://localhost:5000/api";</script>
</head>
<body>
<div class="app-shell" id="app" style="display:none">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
      </div>
      TallerPro
    </div>
    <div class="topbar-search" style="position:relative">
      <span class="search-icon">⌕</span>
      <input type="text" id="globalSearch" placeholder="Buscar patente, cliente, OT…" autocomplete="off"
        oninput="handleGlobalSearch(this.value)" onfocus="showSearchDrop()" onblur="setTimeout(hideSearchDrop,200)">
      <div class="search-dropdown hidden" id="searchDrop"></div>
    </div>
    <div class="topbar-right">
      <div class="user-chip" onclick="navTo('perfil')">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userName">—</span>
      </div>
      <button class="btn btn-sm btn-ghost" onclick="doLogout()">Salir</button>
    </div>
  </header>

  <div class="main-layout">

    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="nav-section">Principal</div>
      <div class="nav-item active" data-page="dashboard" onclick="navTo('dashboard')">
        <span class="nav-icon">◉</span><span>Dashboard</span>
      </div>
      <div class="nav-item" data-page="ots" onclick="navTo('ots')">
        <span class="nav-icon">≡</span><span>Órdenes de trabajo</span>
        <span class="nav-badge" id="navBadgeOT">0</span>
      </div>
      <div class="nav-section">Registros</div>
      <div class="nav-item" data-page="clientes" onclick="navTo('clientes')">
        <span class="nav-icon">◎</span><span>Clientes</span>
      </div>
      <div class="nav-item" data-page="vehiculos" onclick="navTo('vehiculos')">
        <span class="nav-icon">▷</span><span>Vehículos</span>
      </div>
      <div class="nav-item" data-page="historial" onclick="navTo('historial')">
        <span class="nav-icon">◷</span><span>Historial</span>
      </div>
      <div class="nav-section">Gestión</div>
      <div class="nav-item" data-page="cotizaciones" onclick="navTo('cotizaciones')">
        <span class="nav-icon">$</span><span>Cotizaciones</span>
      </div>
      <div class="nav-item" data-page="agenda" onclick="navTo('agenda')">
        <span class="nav-icon">▦</span><span>Agenda</span>
      </div>
      <div class="nav-item" data-page="kanban" onclick="navTo('kanban')">
        <span class="nav-icon">📋</span><span>Kanban</span>
      </div>
      <div class="nav-item" data-page="inventario" onclick="navTo('inventario')">
        <span class="nav-icon">📦</span><span>Inventario</span>
        <span class="nav-badge amber" id="navBadgeInv" style="display:none">0</span>
      </div>
      <div class="nav-item" data-page="precompras" onclick="navTo('precompras')">
        <span class="nav-icon">🔍</span><span>Precompra</span>
      </div>
      <div class="nav-item" data-page="ia" onclick="navTo('ia')">
        <span class="nav-icon">✦</span><span>Asistente IA</span>
      </div>
    </nav>

    <!-- CONTENT -->
    <main class="content" id="mainContent"></main>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ MODALS ═══ -->

<!-- Modal OT -->
<div class="modal-overlay hidden" id="modalOT">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nueva orden de trabajo</span>
      <button class="modal-close" onclick="closeModal('modalOT')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Cliente *</label>
        <select id="otCliSel" onchange="loadVehsByCliente()">
          <option value="">Seleccionar cliente…</option>
        </select>
      </div>
      <div class="form-group">
        <label>Vehículo *</label>
        <select id="otVehSel"><option value="">Primero seleccione cliente</option></select>
      </div>
      <div class="form-group">
        <label>Km ingreso</label>
        <input type="number" id="otKm" placeholder="95000">
      </div>
      <div class="form-group">
        <label>Técnico asignado</label>
        <input type="text" id="otTecnico" placeholder="Nombre del técnico">
      </div>
      <div class="form-group full">
        <label>Trabajo solicitado *</label>
        <textarea id="otTrabajo" rows="3" placeholder="Descripción del trabajo o falla reportada por el cliente…"></textarea>
      </div>
      <div class="form-group">
        <label>Fecha ingreso</label>
        <input type="date" id="otFecha">
      </div>
      <div class="form-group">
        <label>Estado inicial</label>
        <select id="otEstado">
          <option value="recibido">Recibido</option>
          <option value="diagnosticando">Diagnosticando</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modalOT')">Cancelar</button>
      <button class="btn btn-primary" id="btnCrearOT" onclick="crearOT()">Crear OT</button>
    </div>
  </div>
</div>

<!-- Modal Cliente -->
<div class="modal-overlay hidden" id="modalCliente">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nuevo cliente</span>
      <button class="modal-close" onclick="closeModal('modalCliente')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Nombre completo *</label><input type="text" id="cNombre" placeholder="Juan Pérez García"></div>
      <div class="form-group"><label>RUT</label><input type="text" id="cRut" placeholder="12.345.678-9"></div>
      <div class="form-group"><label>Teléfono *</label><input type="tel" id="cTel" placeholder="+56 9 1234 5678"></div>
      <div class="form-group"><label>Email</label><input type="email" id="cEmail" placeholder="juan@email.com"></div>
      <div class="form-group full"><label>Dirección</label><input type="text" id="cDir" placeholder="Av. Principal 123"></div>
      <div class="form-group full"><label>Observaciones</label><textarea id="cObs" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modalCliente')">Cancelar</button>
      <button class="btn btn-primary" id="btnCrearCli" onclick="crearCliente()">Guardar cliente</button>
    </div>
  </div>
</div>

<!-- Modal Vehículo -->
<div class="modal-overlay hidden" id="modalVehiculo">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nuevo vehículo</span>
      <button class="modal-close" onclick="closeModal('modalVehiculo')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Patente *</label><input type="text" id="vPat" placeholder="ABCD12" oninput="this.value=this.value.toUpperCase()"></div>
      <div class="form-group"><label>Cliente propietario *</label><select id="vCliSel"><option value="">Seleccionar…</option></select></div>
      <div class="form-group"><label>Marca *</label><input type="text" id="vMarca" placeholder="Toyota"></div>
      <div class="form-group"><label>Modelo *</label><input type="text" id="vModelo" placeholder="Corolla"></div>
      <div class="form-group"><label>Año</label><input type="number" id="vAnio" placeholder="2018" min="1950" max="2035"></div>
      <div class="form-group"><label>Color</label><input type="text" id="vColor" placeholder="Blanco"></div>
      <div class="form-group"><label>Motor / Cilindrada</label><input type="text" id="vMotor" placeholder="1.8L 2ZR-FE"></div>
      <div class="form-group"><label>Combustible</label>
        <select id="vCombustible"><option value="">—</option><option>bencina</option><option>diesel</option><option>electrico</option><option>hibrido</option></select>
      </div>
      <div class="form-group"><label>VIN / N° chasis</label><input type="text" id="vVIN" placeholder="JT…"></div>
      <div class="form-group"><label>Transmisión</label>
        <select id="vTrans"><option value="">—</option><option>manual</option><option>automatico</option><option>cvt</option></select>
      </div>
      <div class="form-group full"><label>Observaciones</label><textarea id="vObs" rows="2" placeholder="Daños previos, accesorios…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modalVehiculo')">Cancelar</button>
      <button class="btn btn-primary" id="btnCrearVeh" onclick="crearVehiculo()">Guardar vehículo</button>
    </div>
  </div>
</div>

<!-- Modal Evento -->
<div class="modal-overlay hidden" id="modalEvento">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span class="modal-title">Nuevo evento</span>
      <button class="modal-close" onclick="closeModal('modalEvento')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group full"><label>Título *</label><input type="text" id="evTitulo" placeholder="Revisión técnica, entrega vehículo…"></div>
      <div class="form-group"><label>Fecha *</label><input type="date" id="evFecha"></div>
      <div class="form-group"><label>Hora</label><input type="time" id="evHora" value="09:00"></div>
      <div class="form-group"><label>Tipo</label>
        <select id="evTipo"><option value="recordatorio">Recordatorio</option><option value="cita">Cita</option><option value="entrega">Entrega</option></select>
      </div>
      <div class="form-group full"><label>Descripción</label><textarea id="evDesc" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modalEvento')">Cancelar</button>
      <button class="btn btn-primary" id="btnCrearEv" onclick="crearEvento()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ SCRIPTS ═══ -->
<script src="js/api.js"></script>
<script src="js/pages.js"></script>
  <script src="js/modulos.js"></script>
  <script src="js/inventario.js"></script>
  <script src="js/kanban.js"></script>
</body>
</html>
